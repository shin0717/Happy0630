<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨小碩的生日一番賞✨</title>
<style>
    /* 🎀 全域可愛風設定與馬卡龍漸層背景 */
    body {
        background: linear-gradient(135deg, #1f151c, #140d12);
        margin: 0;
        padding: 20px 10px;
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    }
    
    .lottery-container {
        background: linear-gradient(135deg, #331d2c, #1f121b); 
        color: #fff;
        padding: 30px 20px;
        border-radius: 24px; /* 更圓潤的可愛感 */
        text-align: center;
        max-width: 750px;
        margin: 0 auto;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 182, 193, 0.1);
        border: 2px solid rgba(255, 182, 193, 0.15);
    }

    /* 👑 主標題：加粗、閃亮、加上星星 */
    h2 { 
        color: #ffccd5; 
        text-shadow: 0 0 12px rgba(255,182,193,0.6), 0 2px 4px rgba(0,0,0,0.5); 
        margin-top: 5px;
        margin-bottom: 25px; 
        font-size: 1.8em;
        letter-spacing: 2px;
    }

    /* 🗺️ 夢幻馬卡龍配率海報牆 */
    .poster-board {
        background: rgba(255, 255, 255, 0.04);
        border: 3px dashed #ff9ebb;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 30px;
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 改為 4 欄更適合 11 張籤的排版 */
        gap: 12px;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
    }
    
    /* 手機板自動適應排版 */
    @media (max-width: 600px) {
        .poster-board { grid-template-columns: repeat(2, 1fr); }
    }
    
    .poster-title {
        grid-column: 1 / -1;
        font-weight: bold;
        color: #ffe3ec;
        font-size: 1.1em;
        margin-bottom: 12px;
        text-align: left;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    /* 🔲 還沒抽到的空白海報格 */
    .poster-grid-item {
        background: rgba(255, 255, 255, 0.06); 
        color: #ffb3c6;
        border-radius: 12px;
        padding: 15px 5px;
        font-weight: bold;
        position: relative;
        border: 2px solid rgba(255, 158, 187, 0.2);
        min-height: 85px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .grid-赏 {
        font-size: 1.6em;
        font-weight: 900;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .grid-name {
        font-size: 0.75em;
        color: #5c3443;
        margin-top: 8px;
        display: none; 
        padding: 0 6px;
        font-weight: bold;
        line-height: 1.3;
    }

    /* 🎯 抽中後貼回海報的可愛實體卡片狀態 */
    .poster-grid-item.pasted {
        background: linear-gradient(135deg, #fff5f7, #ffe3ec) !important; 
        border-color: #ff9ebb !important;
        color: #4a2333 !important;
        box-shadow: 0 6px 15px rgba(255,158,187,0.4);
        transform: scale(1.03) rotate(1deg); /* 微微傾斜更有手作感 */
    }
    .poster-grid-item.pasted .grid-赏 {
        color: #de4772 !important;
        font-size: 1.1em; 
    }
    .poster-grid-item.pasted .grid-name {
        display: -webkit-box; 
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* 📦 草莓歐蕾軟糖抽獎箱 */
    .ichiban-box {
        background: rgba(74, 40, 52, 0.7); 
        border: 5px solid #ff9ebb; 
        border-top-color: #ffd0dd;
        border-left-color: #ffb3c6;
        border-radius: 18px;
        padding: 30px 20px;
        min-height: 160px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        align-items: center;
        box-shadow: 
            inset 0 15px 30px rgba(0,0,0,0.6), 
            inset 0 -15px 30px rgba(0,0,0,0.4),
            0 12px 25px rgba(0,0,0,0.5);
        margin-bottom: 10px;
        position: relative;
    }

    /* 🎫 抽獎箱裡的愛心小籤紙 */
    .lottery-ticket {
        width: 65px;
        height: 90px;
        background: linear-gradient(135deg, #ff85a2, #e3446c); 
        border: 2px solid #ffe3ec; 
        border-radius: 10px; /* 更圓潤 */
        box-shadow: 0 5px 10px rgba(0,0,0,0.4);
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.2em; 
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        user-select: none;
    }
    .lottery-ticket:hover {
        transform: translateY(-8px) scale(1.1) rotate(-2deg);
        box-shadow: 0 12px 22px rgba(255,133,162,0.6);
        border-color: #ffffff;
        background: linear-gradient(135deg, #ff9ebb, #f0547c);
    }

    /* 🎬 撕開動畫大特寫舞台 */
    .rip-stage {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(22, 14, 18, 0.92); 
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }
    .rip-stage.active {
        opacity: 1;
        pointer-events: auto;
    }

    .rip-ticket-box {
        position: relative;
        width: 320px;
        height: 200px;
        background: #fffcfd; 
        border-radius: 16px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px; 
        border: 3px solid #ffccd5;
    }

    .inner-prize {
        text-align: center;
        color: #333;
        width: 100%;
        padding: 20px;
    }
    .prize-badge {
        font-size: 2.6em;
        font-weight: 900;
        color: #e3446c;
        margin-bottom: 6px;
        letter-spacing: 1px;
    }
    .prize-title { font-size: 1.25em; font-weight: bold; color: #4a2333; }

    /* 撕開前的精緻卡片封面 */
    .top-cover {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #ff85a2, #e3446c);
        border: 4px solid #ffccd5;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 1.5em;
        font-weight: bold;
        letter-spacing: 2px;
        cursor: pointer;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: left center; 
        z-index: 2;
    }
    
    /* 鋸齒花邊 */
    .top-cover::after {
        content: '';
        position: absolute;
        top: 0; right: 0; width: 12px; height: 100%;
        background-image: linear-gradient(45deg, transparent 33.33%, #e3446c 33.33%, #e3446c 66.66%, transparent 66.66%),
                          linear-gradient(-45deg, transparent 33.33%, #e3446c 33.33%, #e3446c 66.66%, transparent 66.66%);
        background-size: 12px 24px;
        transform: translateX(6px);
    }

    .top-cover.ripped {
        transform: rotateY(-120deg) skewY(6deg) translateX(-10px);
        box-shadow: 12px 0 30px rgba(0,0,0,0.5);
    }

    /* 可愛蝴蝶結/圓角風格按鈕 */
    .close-btn {
        position: absolute;
        bottom: -70px;
        background: linear-gradient(45deg, #ff85a2, #ffb3c6);
        border: 2px solid #ffffff;
        padding: 12px 35px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 1.05em;
        color: #fff;
        cursor: pointer;
        display: none;
        box-shadow: 0 6px 20px rgba(255,133,162,0.5);
        transition: 0.2s;
        text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .close-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,133,162,0.7); }
</style>
</head>
<body>

<div class="lottery-container">
    <h2>✨小碩的生日一番賞✨</h2>
    
    <div class="poster-board" id="posterBoard"></div>

    <p style="color: #ffccd5; font-size: 0.95em; margin-bottom: 15px; text-align: left; padding-left: 5px; font-weight: bold;">✨ 抽獎箱（請點選任意一個紅包卡片 🎫）</p>
    <div class="ichiban-box" id="cardContainer"></div>
</div>

<div class="rip-stage" id="ripStage">
    <div style="position: relative; display: flex; flex-direction: column; align-items: center;">
        <p id="ripTip" style="color: #ffccd5; font-weight: bold; margin-bottom: 18px; font-size: 1.35em; text-shadow: 0 2px 6px #000; letter-spacing: 2px;">💖 點擊卡片把它驚喜撕開！ 💖</p>
        <div class="rip-ticket-box">
            <div class="inner-prize">
                <div class="prize-badge" id="displayId"></div>
                <div class="prize-title" id="displayName"></div>
            </div>
            <div class="top-cover" id="ticketCover" onclick="triggerRipAnimation()">
                <span style="font-size: 1.6em; margin-bottom: 6px;">🎁</span>
                <span style="font-size: 0.85em; letter-spacing: 3px;">PULL 撕開驚喜</span>
            </div>
        </div>
        <button class="close-btn" id="closeStageBtn" onclick="closeStage()">收下獎項並貼上海報 ✨</button>
    </div>
</div>

<script>
    // ⚙️ 專屬獎品內容與精準數量
    const prizesConfig = [
        { "id": "A", "name": "A賞：手寫卡片❤️", "count": 1 },
        { "id": "B", "name": "B賞：可愛小鏡子一枚", "count": 1 },
        { "id": "C", "name": "C賞：盲盒一個", "count": 1 },
        { "id": "D", "name": "D賞：隨機小卡", "count": 5 },
        { "id": "E", "name": "E賞：親親", "count": 2 },
        { "id": "F", "name": "F賞：搖桿一隻", "count": 1 }
    ];

    let posterData = [];
    let globalId = 0;
    prizesConfig.forEach(p => {
        for (let i = 0; i < p.count; i++) {
            posterData.push({ "uid": globalId, "id": p.id, "name": p.name, "isDrawn": false });
            globalId++;
        }
    });

    // 複製一份並洗牌
    let ticketPool = [...posterData];
    ticketPool.sort(() => Math.random() - 0.5); 

    let currentSelectedIndex = null;

    function renderGame() {
        let posterHtml = '<div class="poster-title">📊 獎項貼紙公佈欄（抽中後會貼在此處）：</div>';
        posterData.forEach(item => {
            let pastedClass = item.isDrawn ? 'pasted' : '';
            let nameContent = item.isDrawn ? (item.name) : '';
            posterHtml += `
                <div class="poster-grid-item ${pastedClass}" id="poster-item-${item.uid}">
                    <div class="grid-赏">${item.id}賞</div>
                    <div class="grid-name">${nameContent}</div>
                </div>
            `;
        });
        document.getElementById('posterBoard').innerHTML = posterHtml;

        let container = document.getElementById('cardContainer');
        if (ticketPool.length === 0) {
            container.innerHTML = "<div style='font-size:1.2em; color:#ffccd5; padding:40px; letter-spacing:1px; font-weight:bold;'>🎉 完售！所有驚喜都被抽空囉！生日快樂！ 🎉</div>";
            return;
        }

        let cardsHtml = '';
        ticketPool.forEach((ticket, index) => {
            cardsHtml += `<div class="lottery-ticket" onclick="openRipStage(${index})">🎁</div>`;
        });
        container.innerHTML = cardsHtml;
    }

    function openRipStage(index) {
        currentSelectedIndex = index;
        document.getElementById('displayId').innerText = "";
        document.getElementById('displayName').innerText = "";
        document.getElementById('ripStage').classList.add('active');
    }

    function triggerRipAnimation() {
        let cover = document.getElementById('ticketCover');
        if (cover.classList.contains('ripped')) return; 

        let selectedTicket = ticketPool[currentSelectedIndex];
        cover.classList.add('ripped'); 
        document.getElementById('ripTip').style.display = 'none';

        setTimeout(() => {
            document.getElementById('displayId').innerText = selectedTicket.id + " 賞";
            document.getElementById('displayName').innerText = selectedTicket.name;
            let posterItem = posterData.find(p => p.uid === selectedTicket.uid);
            if (posterItem) posterItem.isDrawn = true;
        }, 80);

        setTimeout(() => {
            document.getElementById('closeStageBtn').style.display = 'block';
        }, 600);
    }

    function closeStage() {
        document.getElementById('ripStage').classList.remove('active');
        document.getElementById('ticketCover').classList.remove('ripped');
        document.getElementById('displayId').innerText = "";
        document.getElementById('displayName').innerText = "";
        document.getElementById('ripTip').style.display = 'block';
        document.getElementById('closeStageBtn').style.display = 'none';

        if (currentSelectedIndex !== null) {
            ticketPool.splice(currentSelectedIndex, 1); 
            currentSelectedIndex = null;
        }
        
        setTimeout(() => { renderGame(); }, 200);
    }

    renderGame();
</script>
</body>
</html>
