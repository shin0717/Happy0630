<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨小碩的生日一番賞✨</title>
<style>
    /* 🎀 全域可愛風設定與馬卡龍漸層背景 */
    body {
        background: linear-gradient(135deg, #1f151c, #140d12);
        margin: 0;
        padding: 20px 10px;
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 95vh;
    }
    
    .lottery-container {
        background: linear-gradient(135deg, #331d2c, #1f121b); 
        color: #fff;
        padding: 30px;
        border-radius: 24px; 
        text-align: center;
        width: 100%;
        max-width: 1150px; /* 稍微加寬以容納 4x3 的精緻排版 */
        box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 182, 193, 0.1);
        border: 2px solid rgba(255, 182, 193, 0.15);
        box-sizing: border-box;
    }

    /* 👑 主標題 */
    h2 { 
        color: #ffccd5; 
        text-shadow: 0 0 12px rgba(255,182,193,0.6), 0 2px 4px rgba(0,0,0,0.5); 
        margin-top: 5px;
        margin-bottom: 25px; 
        font-size: 2em;
        letter-spacing: 2px;
    }

    /* 🧱 核心左右大版面區塊 */
    .main-layout {
        display: flex;
        gap: 25px;
        align-items: flex-start;
        justify-content: center;
    }

    /* 🗺️ 左側：夢幻馬卡龍海報牆 */
    .left-poster-section {
        flex: 1.1; 
    }

    .poster-board {
        background: rgba(255, 255, 255, 0.04);
        border: 3px dashed #ff9ebb;
        border-radius: 16px;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
    }
    
    .poster-title {
        grid-column: 1 / -1;
        font-weight: bold;
        color: #ffe3ec;
        font-size: 1.1em;
        margin-bottom: 12px;
        text-align: left;
        letter-spacing: 1px;
    }

    /* 🔲 卡片通用樣式基礎 (海報、抽獎箱、大特寫都繼承此結構概念) */
    .universal-card {
        border-radius: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 10px 6px;
        text-align: center;
    }

    /* 上面大字 */
    .card-main {
        font-size: 1.6em;
        font-weight: 900;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        line-height: 1.2;
    }

    /* 下面小字 (過濾後的純獎品名稱) */
    .card-sub {
        font-size: 0.85em;
        margin-top: 6px;
        font-weight: bold;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-all;
    }

    /* 未抽中的海報格子預設樣式 */
    .poster-grid-item {
        background: rgba(255, 255, 255, 0.06); 
        color: #ffb3c6;
        border: 2px solid rgba(255, 158, 187, 0.2);
        min-height: 95px;
    }
    .poster-grid-item .card-sub {
        display: none; /* 未抽中前隱藏下方小字 */
    }

    /* 🎯 貼回海報時的卡片樣式 (維持上面大字下面小字) */
    .poster-grid-item.pasted {
        background: linear-gradient(135deg, #fff5f7, #ffe3ec) !important; 
        border-color: #ff9ebb !important;
        color: #4a2333 !important;
        box-shadow: 0 6px 15px rgba(255,158,187,0.4);
        transform: scale(1.03) rotate(1deg); 
    }
    .poster-grid-item.pasted .card-main {
        color: #de4772 !important;
    }
    .poster-grid-item.pasted .card-sub {
        display: -webkit-box; 
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        color: #613947;
    }

    /* 📦 右側：草莓歐蕾抽獎箱區塊 */
    .right-box-section {
        flex: 1.2;
        text-align: left;
    }

    .box-title {
        font-weight: bold;
        color: #ffccd5;
        font-size: 1.1em;
        margin-bottom: 12px;
        letter-spacing: 1px;
    }

    /* 🎰 抽獎箱：精準排成 4 * 3 網格 */
    .ichiban-box {
        background: rgba(74, 40, 52, 0.7); 
        border: 5px solid #ff9ebb; 
        border-top-color: #ffd0dd;
        border-left-color: #ffb3c6;
        border-radius: 18px;
        padding: 20px;
        min-height: 340px; 
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 橫向 4 格 */
        grid-auto-rows: 95px; /* 縱向固定高度，確保對齊 */
        gap: 12px;
        justify-content: center;
        align-content: center;
        box-shadow: 
            inset 0 15px 30px rgba(0,0,0,0.6), 
            inset 0 -15px 30px rgba(0,0,0,0.4),
            0 12px 25px rgba(0,0,0,0.5);
    }

    /* 🎫 抽獎箱裡的卡片 (維持相同結構樣式) */
    .lottery-ticket {
        background: linear-gradient(135deg, #ff85a2, #e3446c); 
        border: 2px solid #ffe3ec; 
        color: #fff;
        box-shadow: 0 5px 10px rgba(0,0,0,0.4);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        user-select: none;
    }
    .lottery-ticket:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 10px 20px rgba(255,133,162,0.6);
        border-color: #ffffff;
    }

    /* 📱 RWD 行動裝置自動重排 */
    @media (max-width: 850px) {
        .main-layout { flex-direction: column; }
        .poster-board { grid-template-columns: repeat(2, 1fr); }
        .ichiban-box { grid-template-columns: repeat(3, 1fr); min-height: 160px; }
    }

    /* 🎬 撕開動畫大特寫舞台 */
    .rip-stage {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(22, 14, 18, 0.95); 
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }
    .rip-stage.active {
        opacity: 1;
        pointer-events: auto;
    }

    /* 大特寫實體卡片外框 */
    .rip-ticket-box {
        position: relative;
        width: 260px;
        height: 160px;
        background: linear-gradient(135deg, #fff5f7, #ffe3ec); 
        border-radius: 16px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px; 
        border: 3px solid #ffccd5;
    }

    /* 內部揭曉的卡片，同樣也是上大下小 */
    .inner-prize {
        width: 100%;
        height: 100%;
        color: #4a2333;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .inner-prize .card-main {
        color: #de4772;
        font-size: 2.2em;
    }
    .inner-prize .card-sub {
        font-size: 1.05em;
        color: #613947;
        margin-top: 10px;
    }

    /* 撕開前的精緻卡片封面 */
    .top-cover {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #ff85a2, #e3446c);
        border: 4px solid #ffccd5;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        cursor: pointer;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: left center; 
        z-index: 2;
    }
    
    .top-cover::after {
        content: '';
        position: absolute;
        top: 0; right: 0; width: 12px; height: 100%;
        background-image: linear-gradient(45deg, transparent 33.33%, #e3446c 33.33%, #e3446c 66.66%, transparent 66.66%),
                          linear-gradient(-45deg, transparent 33.33%, #e3446c 33.33%, #e3446c 66.66%, transparent 66.66%);
        background-size: 12px 24px;
        transform: translateX(6px);
    }

    .top-cover.ripped {
        transform: rotateY(-120deg) skewY(6deg) translateX(-10px);
        box-shadow: 12px 0 30px rgba(0,0,0,0.5);
    }

    .close-btn {
        position: absolute;
        bottom: -75px;
        background: linear-gradient(45deg, #ff85a2, #ffb3c6);
        border: 2px solid #ffffff;
        padding: 12px 35px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 1.05em;
        color: #fff;
        cursor: pointer;
        display: none;
        box-shadow: 0 6px 20px rgba(255,133,162,0.5);
        transition: 0.2s;
        text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .close-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="lottery-container">
    <h2>✨小碩的生日一番賞✨</h2>
    
    <div class="main-layout">
        
        <div class="left-poster-section">
            <div class="poster-board" id="posterBoard"></div>
        </div>

        <div class="right-box-section">
            <div class="box-title">🎁 抽獎箱（4 × 3 經典排版）：</div>
            <div class="ichiban-box" id="cardContainer"></div>
        </div>

    </div>
</div>

<div class="rip-stage" id="ripStage">
    <div style="position: relative; display: flex; flex-direction: column; align-items: center;">
        <p id="ripTip" style="color: #ffccd5; font-weight: bold; margin-bottom: 18px; font-size: 1.35em; text-shadow: 0 2px 6px #000; letter-spacing: 2px;">💖 點擊卡片把它驚喜撕開！ 💖</p>
        <div class="rip-ticket-box">
            <div class="inner-prize">
                <div class="card-main" id="displayMain"></div>
                <div class="card-sub" id="displaySub"></div>
            </div>
            <div class="top-cover" id="ticketCover" onclick="triggerRipAnimation()">
                <span style="font-size: 1.6em; margin-bottom: 6px;">🎁</span>
                <span style="font-size: 0.85em; letter-spacing: 3px;">PULL 撕開驚喜</span>
            </div>
        </div>
        <button class="close-btn" id="closeStageBtn" onclick="closeStage()">收下並貼上海報 ✨</button>
    </div>
</div>

<script>
    // ⚙️ 專屬獎品內容
    const prizesConfig = [
        { "id": "A", "name": "A賞：手寫卡片❤️", "count": 1 },
        { "id": "B", "name": "B賞：可愛小鏡子一枚", "count": 1 },
        { "id": "C", "name": "C賞：盲盒一個", "count": 1 },
        { "id": "D", "name": "D賞：隨機小卡", "count": 5 },
        { "id": "E", "name": "E賞：親親", "count": 2 },
        { "id": "F", "name": "F賞：搖桿一隻", "count": 1 }
    ];

    // 小工具：用來把 "A賞：手寫卡片❤️" 變成 "手寫卡片❤️"，移除重複的賞字
    function cleanPrizeName(fullName, id) {
        let prefix = id + "賞";
        if (fullName.startsWith(prefix)) {
            let rest = fullName.substring(prefix.length);
            if (rest.startsWith("：") || rest.startsWith(":")) {
                return rest.substring(1);
            }
            return rest;
        }
        return fullName;
    }

    let posterData = [];
    let globalId = 0;
    prizesConfig.forEach(p => {
        for (let i = 0; i < p.count; i++) {
            // 先過濾出乾淨的名稱 (小字專用，避免重複出現「賞」)
            let shortName = cleanPrizeName(p.name, p.id);
            posterData.push({ 
                "uid": globalId, 
                "id": p.id, 
                "mainText": p.id + "賞", 
                "subText": shortName, 
                "isDrawn": false 
            });
            globalId++;
        }
    });

    // 複製出一份隨機洗牌的抽獎箱卡片池
    let ticketPool = [...posterData];
    ticketPool.sort(() => Math.random() - 0.5); 

    let currentSelectedIndex = null;

    function renderGame() {
        // 1. 渲染左側海報公佈欄
        let posterHtml = '<div class="poster-title">📊 獎項貼紙公佈欄：</div>';
        posterData.forEach(item => {
            let pastedClass = item.isDrawn ? 'pasted' : '';
            let subContent = item.isDrawn ? item.subText : '';
            posterHtml += `
                <div class="universal-card poster-grid-item ${pastedClass}" id="poster-item-${item.uid}">
                    <div class="card-main">${item.mainText}</div>
                    <div class="card-sub">${subContent}</div>
                </div>
            `;
        });
        document.getElementById('posterBoard').innerHTML = posterHtml;

        // 2. 渲染右側抽獎箱
        let container = document.getElementById('cardContainer');
        if (ticketPool.length === 0) {
            container.style.display = "block";
            container.innerHTML = "<div style='font-size:1.1em; color:#ffccd5; padding:40px 10px; text-align:center; width:100%; font-weight:bold;'>🎉 完售！所有驚喜都被抽空囉！生日快樂！ 🎉</div>";
            return;
        } else {
            container.style.display = "grid"; // 確保維持 4*3 網格
        }

        let cardsHtml = '';
        ticketPool.forEach((ticket, index) => {
            // 抽獎箱內的卡片未撕開前，統一格式，上面顯示大大的大字，下面不重複賞字顯示驚喜
            cardsHtml += `
                <div class="universal-card lottery-ticket" onclick="openRipStage(${index})">
                    <div class="card-main">${ticket.mainText}</div>
                    <div class="card-sub" style="opacity:0.8; font-size:0.75em;">❔❔❔</div>
                </div>
            `;
        });
        container.innerHTML = cardsHtml;
    }

    function openRipStage(index) {
        currentSelectedIndex = index;
        document.getElementById('displayMain').innerText = "";
        document.getElementById('displaySub').innerText = "";
        document.getElementById('ripStage').classList.add('active');
    }

    function triggerRipAnimation() {
        let cover = document.getElementById('ticketCover');
        if (cover.classList.contains('ripped')) return; 

        let selectedTicket = ticketPool[currentSelectedIndex];
        cover.classList.add('ripped'); 
        document.getElementById('ripTip').style.display = 'none';

        setTimeout(() => {
            // 特寫舞台上的卡片同步為：上面大字，下面小字
            document.getElementById('displayMain').innerText = selectedTicket.mainText;
            document.getElementById('displaySub').innerText = selectedTicket.subText;
            
            let posterItem = posterData.find(p => p.uid === selectedTicket.uid);
            if (posterItem) posterItem.isDrawn = true;
        }, 80);

        setTimeout(() => {
            document.getElementById('closeStageBtn').style.display = 'block';
        }, 600);
    }

    function closeStage() {
        document.getElementById('ripStage').classList.remove('active');
        document.getElementById('ticketCover').classList.remove('ripped');
        document.getElementById('displayMain').innerText = "";
        document.getElementById('displaySub').innerText = "";
        document.getElementById('ripTip').style.display = 'block';
        document.getElementById('closeStageBtn').style.display = 'none';

        if (currentSelectedIndex !== null) {
            ticketPool.splice(currentSelectedIndex, 1); 
            currentSelectedIndex = null;
        }
        
        setTimeout(() => { renderGame(); }, 200);
    }

    renderGame();
</script>
</body>
</html>
